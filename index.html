<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Orbit</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4ff;
  --white:#fff;
  --blue:#1d6df5;
  --blue2:#1558d6;
  --blue3:#e8f0fe;
  --blue4:#c7d9fd;
  --text:#0d1b2a;
  --text2:#536076;
  --text3:#9baec8;
  --border:#e4eaf4;
  --red:#f03e3e;
  --green:#12b76a;
  --sh:0 2px 12px rgba(29,109,245,.08);
  --sh2:0 6px 24px rgba(29,109,245,.2);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:0}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.page{display:none;padding:14px 14px 20px}
.page.active{display:block}

/* NAV */
#nav{display:flex;align-items:flex-end;justify-content:space-around;background:var(--white);border-top:2px solid var(--border);padding:6px 0 max(12px,env(safe-area-inset-bottom));flex-shrink:0;box-shadow:0 -4px 24px rgba(29,109,245,.07)}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex:1;padding:4px 2px;transition:.15s}
.ni-ico{width:32px;height:32px;border-radius:11px;display:flex;align-items:center;justify-content:center;transition:.15s;background:transparent}
.ni-ico svg{width:22px;height:22px;stroke:var(--text3);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:.15s}
.ni-lbl{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.1px;transition:.15s}
.ni.active .ni-ico{background:var(--blue3)}
.ni.active .ni-ico svg{stroke:var(--blue)}
.ni.active .ni-lbl{color:var(--blue)}
.nc{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex:1}
.nc-wrap{width:56px;height:56px;background:var(--blue);border-radius:20px;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh2);margin-top:-20px;border:3px solid var(--bg);transition:.15s}
.nc-wrap svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nc:active .nc-wrap{transform:scale(.88)}
.nc-lbl{font-size:10px;color:var(--blue);font-weight:700}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.tl{display:flex;align-items:center;gap:10px}
.tav{width:40px;height:40px;border-radius:13px;background:linear-gradient(135deg,var(--blue),#60a5fa);display:flex;align-items:center;justify-content:center;font-family:'Syne';font-size:16px;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:-.5px}
.tname{font-weight:700;font-size:14px;color:var(--text);line-height:1.2}
.tbal{font-size:11px;color:var(--text3);margin-top:1px;font-weight:500}
.lbtn{background:var(--blue3);border:1.5px solid var(--blue4);color:var(--blue);padding:7px 14px;border-radius:20px;font-family:'Inter';font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.lbtn:active{background:var(--blue);color:#fff}

/* HERO */
.hero{background:linear-gradient(135deg,#1558d6,#2d7ef7,#60a5fa);border-radius:24px;padding:22px 20px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:var(--sh2)}
.hero-ring1{position:absolute;top:-60px;right:-60px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.07)}
.hero-ring2{position:absolute;bottom:-50px;left:-40px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.05)}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;position:relative;z-index:1}
.hero-left{display:flex;flex-direction:column}
.hero-tag{font-size:10px;color:rgba(255,255,255,.65);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hero-title{font-family:'Syne';font-size:32px;color:#fff;font-weight:800;letter-spacing:1px;line-height:1}
.hero-sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:5px;font-weight:500}
.hero-wbtn{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);border-radius:14px;padding:9px 12px;cursor:pointer;transition:.15s;text-align:right;min-width:90px}
.hero-wbtn:active{background:rgba(255,255,255,.28)}
.hero-wlbl{font-size:9px;color:rgba(255,255,255,.65);font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.hero-wval{font-size:12px;color:#fff;font-weight:700;margin-top:2px;max-width:85px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hero-bals{display:flex;gap:10px;position:relative;z-index:1}
.hb{flex:1;background:rgba(255,255,255,.15);border-radius:16px;padding:13px 15px;backdrop-filter:blur(4px)}
.hb-val{font-family:'Syne';font-size:26px;color:#fff;font-weight:800;line-height:1}
.hb-lbl{font-size:10px;color:rgba(255,255,255,.6);font-weight:700;margin-top:3px;letter-spacing:.5px}

/* CARDS */
.card{background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:18px;margin-bottom:12px;box-shadow:var(--sh)}
.clbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;font-weight:700}

/* BUTTONS */
.btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:14px;font-family:'Inter';font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--sh2);transition:.15s}
.btn:active{transform:scale(.97);background:var(--blue2)}
.btn-ghost{background:var(--blue3);color:var(--blue);box-shadow:none;border:1.5px solid var(--blue4)}
.btn-ghost:active{background:var(--blue4)}
.btn-off{background:var(--bg);color:var(--text3);box-shadow:none;border:1.5px solid var(--border);cursor:not-allowed;opacity:.65;pointer-events:none}
.btn-sm{padding:11px 16px;font-size:13px;width:auto;border-radius:11px}
.brow{display:flex;gap:10px}
.bhalf{flex:1}

/* ADS */
.aditem{display:flex;align-items:center;gap:12px;background:var(--bg);border:1.5px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px}
.adico{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ad1bg{background:linear-gradient(135deg,#fff4e6,#ffd8a8)}
.ad2bg{background:linear-gradient(135deg,#e3f9e5,#b2f2bb)}
.adinfo{flex:1}
.adname{font-weight:700;font-size:14px;color:var(--text)}
.adrew{font-size:12px;color:var(--blue);font-weight:700;margin-top:2px}
.adoff{font-size:11px;color:var(--red);font-weight:600;margin-top:2px}
.adlim{font-size:11px;color:var(--text3);margin-top:1px}

/* CHECKIN */
.cibox{background:linear-gradient(135deg,#1558d6,#2d7ef7);border-radius:20px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.cibox-ring{position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.08)}
.cibox .clbl{color:rgba(255,255,255,.7);margin-bottom:14px;position:relative;z-index:1}
.cistats{display:flex;justify-content:space-between;gap:8px;margin-bottom:18px;position:relative;z-index:1}
.cistat{text-align:center;background:rgba(255,255,255,.13);border-radius:14px;padding:11px 10px;flex:1}
.civ{font-family:'Syne';font-size:26px;color:#fff;font-weight:800;line-height:1}
.cil{font-size:9px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.8px;margin-top:3px;font-weight:700}
.ci-btn{background:#fff;color:var(--blue);font-weight:800;border:none;border-radius:12px;width:100%;padding:13px;font-family:'Inter';font-size:15px;cursor:pointer;transition:.15s;position:relative;z-index:1}
.ci-btn:active{transform:scale(.97)}
.ci-btn:disabled{background:rgba(255,255,255,.25);color:rgba(255,255,255,.55);cursor:not-allowed}

/* PROMO */
.pinp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;color:var(--text);font-family:'Inter';font-size:14px;font-weight:600;margin-top:10px;transition:.15s}
.pinp::placeholder{color:var(--text3);font-weight:400}
.pinp:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(29,109,245,.1)}

/* PVP */
.pvp-card{background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:20px;margin-bottom:12px;box-shadow:var(--sh);display:flex;flex-direction:column;align-items:center}
.pvp-bank{font-size:13px;color:var(--text3);font-weight:700;margin-bottom:14px;letter-spacing:.5px;text-align:center}
.pvp-bank span{font-family:'Syne';color:var(--blue);font-size:28px;font-weight:800}
.pvp-st{margin-top:12px;font-size:13px;color:var(--text2);font-weight:600;text-align:center;min-height:20px}
.pvp-st b{color:var(--blue);font-size:17px;font-family:'Syne'}
.pvpadd{display:flex;gap:8px;margin-top:14px;width:100%}
.pvpinp{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:13px;color:var(--text);font-family:'Inter';font-size:14px;font-weight:600;transition:.15s}
.pvpinp:focus{outline:none;border-color:var(--blue);background:#fff}
.pvpinp::placeholder{color:var(--text3);font-weight:400}
.pvp-pl{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1.5px solid var(--bg)}
.pvp-pl:last-child{border-bottom:none}

/* FRIENDS */
.ref-hero{background:linear-gradient(135deg,#1558d6,#2d7ef7);border-radius:20px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden;box-shadow:var(--sh2)}
.ref-ring{position:absolute;bottom:-40px;right:-30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.08)}
.rttl{font-family:'Syne';font-size:22px;color:#fff;font-weight:800;margin-bottom:4px;position:relative;z-index:1}
.rsub{font-size:12px;color:rgba(255,255,255,.7);margin-bottom:16px;font-weight:500;position:relative;z-index:1}
.rstats{display:flex;gap:10px;margin-bottom:16px;position:relative;z-index:1}
.rstat{background:rgba(255,255,255,.15);border-radius:14px;padding:12px;flex:1;text-align:center}
.rval{font-family:'Syne';font-size:26px;color:#fff;font-weight:800;line-height:1}
.rlbl{font-size:9px;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.8px;margin-top:3px;font-weight:700}
.ref-btn{background:#fff;color:var(--blue);font-weight:800;border:none;border-radius:12px;width:100%;padding:13px;font-family:'Inter';font-size:14px;cursor:pointer;transition:.15s;position:relative;z-index:1}
.ref-btn:active{background:var(--blue3)}
.how-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1.5px solid var(--bg)}
.how-row:last-child{border-bottom:none}
.how-n{width:30px;height:30px;background:var(--blue);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;font-family:'Syne';flex-shrink:0}
.how-t{font-size:13px;color:var(--text2);font-weight:500}
.how-t b{color:var(--blue)}

/* PROFILE */
.prof-hero{background:linear-gradient(135deg,#1558d6,#2d7ef7);border-radius:22px;padding:22px 20px;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:var(--sh2)}
.prof-ring{position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.08)}
.prof-ava{width:70px;height:70px;border-radius:22px;background:rgba(255,255,255,.2);border:3px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-family:'Syne';font-size:26px;font-weight:800;color:#fff;position:relative;z-index:1}
.prof-name{font-family:'Syne';font-size:20px;color:#fff;font-weight:800;text-align:center;position:relative;z-index:1}
.prof-bals{display:flex;gap:10px;margin-top:16px;position:relative;z-index:1}
.pb{flex:1;background:rgba(255,255,255,.15);border-radius:14px;padding:12px;text-align:center}
.pb-val{font-family:'Syne';font-size:24px;color:#fff;font-weight:800;line-height:1}
.pb-lbl{font-size:9px;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.8px;margin-top:3px;font-weight:700}

/* WALLET CARD */
.wcard{background:var(--white);border:1.5px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.wcard-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.wcard-ico{width:44px;height:44px;background:linear-gradient(135deg,var(--blue),#60a5fa);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wcard-ico svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.wcard-lbl{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.wcard-val{font-size:13px;color:var(--text);font-weight:700;margin-top:3px}
.wstatus{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:12px}
.wstatus.on{background:#d1fae5;color:var(--green)}
.wstatus.off{background:#fee2e2;color:var(--red)}
.wstatus-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* EXCHANGE */
.exch-box{background:var(--bg);border:1.5px solid var(--border);border-radius:16px;padding:16px}
.irow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1.5px solid var(--white);font-size:13px;color:var(--text2);font-weight:500}
.irow:last-of-type{border-bottom:none}
.ival{color:var(--blue);font-weight:700}
.exch-inp-wrap{position:relative;margin:12px 0 8px}
.exch-inp{width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:14px 60px 14px 14px;color:var(--text);font-family:'Syne';font-size:22px;font-weight:800;transition:.15s}
.exch-inp:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,109,245,.1)}
.exch-inp::placeholder{color:var(--text3);font-size:14px;font-family:'Inter';font-weight:400}
.exch-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-weight:700;color:var(--text3);font-size:13px}
.exch-res{background:var(--blue3);border:1.5px solid var(--blue4);border-radius:12px;padding:13px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.exch-res-lbl{font-size:12px;color:var(--blue);font-weight:700}
.exch-res-val{font-family:'Syne';font-size:22px;color:var(--blue);font-weight:800}

/* PROFILE ROWS */
.prrow{display:flex;justify-content:space-between;align-items:center;background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--sh)}
.prlbl{font-size:13px;color:var(--text2);font-weight:600;display:flex;align-items:center;gap:8px}
.prlbl svg{width:16px;height:16px;stroke:var(--blue);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.prval{font-weight:700;font-size:14px;color:var(--text)}

/* MODAL */
#modal{display:none;position:fixed;inset:0;background:rgba(13,27,42,.45);z-index:1000;align-items:flex-end}
#modal.open{display:flex}
.mbox{background:var(--white);border-radius:24px 24px 0 0;width:100%;padding:20px 20px max(28px,env(safe-area-inset-bottom));animation:mup .22s ease;max-height:90vh;overflow-y:auto}
@keyframes mup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 20px}
.mtitle{font-family:'Syne';font-size:20px;font-weight:800;color:var(--text);margin-bottom:16px}
.minp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:13px;padding:15px 14px;color:var(--text);font-family:'Syne';font-size:22px;font-weight:800;transition:.15s;margin-bottom:10px}
.minp:focus{outline:none;border-color:var(--blue);background:#fff}
.minp::placeholder{color:var(--text3);font-size:14px;font-family:'Inter';font-weight:400}
.mres{background:var(--blue3);border:1.5px solid var(--blue4);border-radius:12px;padding:13px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mres-lbl{font-size:12px;color:var(--blue);font-weight:700}
.mres-val{font-family:'Syne';font-size:22px;color:var(--blue);font-weight:800}
.maddr{background:var(--bg);border:1.5px solid var(--border);border-radius:13px;padding:14px;font-family:monospace;font-size:12px;color:var(--text);word-break:break-all;line-height:1.7;margin-bottom:12px}
.mnote{background:var(--blue3);border:1.5px solid var(--blue4);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--blue);font-weight:600;margin-bottom:16px;line-height:1.7}

/* NOTIF */
#notif{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--text);color:#fff;padding:11px 22px;border-radius:100px;font-family:'Inter';font-size:14px;font-weight:700;z-index:2000;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;box-shadow:0 8px 30px rgba(13,27,42,.25)}
#notif.show{transform:translateX(-50%) translateY(0)}
.muted{color:var(--text3);font-size:13px;font-weight:500}
</style>
</head>
<body>
<div id="notif"></div>
<div id="modal" onclick="if(event.target===this)closeModal()">
  <div class="mbox"><div class="mhandle"></div><div id="mc"></div></div>
</div>
<div id="app">
<div id="content">

<!-- ГЛАВНАЯ -->
<div class="page active" id="page-main">
<div class="topbar">
  <div class="tl">
    <div class="tav" id="av0">?</div>
    <div><div class="tname" id="u0">Загрузка...</div><div class="tbal" id="b0">0.000 TON · 0 BIT</div></div>
  </div>
  <button class="lbtn" id="lb0" onclick="toggleLang()">RU</button>
</div>
<div class="hero">
  <div class="hero-ring1"></div><div class="hero-ring2"></div>
  <div class="hero-top">
    <div>
      <div class="hero-tag" id="h-tag">TON ПЛАТФОРМА</div>
      <div class="hero-title">ORBIT</div>
      <div class="hero-sub" id="h-sub">Зарабатывай TON каждый день</div>
    </div>
    <div class="hero-wbtn" onclick="goTo('profile')">
      <div class="hero-wlbl" id="h-wlbl">КОШЕЛЁК</div>
      <div class="hero-wval" id="h-wval">Подключить →</div>
    </div>
  </div>
  <div class="hero-bals">
    <div class="hb"><div class="hb-val" id="mt">0.000</div><div class="hb-lbl">TON</div></div>
    <div class="hb"><div class="hb-val" id="mb">0</div><div class="hb-lbl">BIT</div></div>
  </div>
</div>
<div class="card">
  <div class="clbl" id="l-ads">РЕКЛАМА</div>
  <div class="aditem">
    <div class="adico ad1bg">📺</div>
    <div class="adinfo">
      <div class="adname" id="an1">Реклама #1</div>
      <div class="adrew">+30 BIT</div>
      <div class="adoff" id="as1">Недоступно</div>
      <div class="adlim" id="al1">0 / 50</div>
    </div>
    <button class="btn btn-off btn-sm" style="width:56px;padding:11px 0;font-size:16px">▶</button>
  </div>
  <div class="aditem">
    <div class="adico ad2bg">📱</div>
    <div class="adinfo">
      <div class="adname" id="an2">Реклама #2</div>
      <div class="adrew">+10 BIT</div>
      <div class="adoff" id="as2">Недоступно</div>
      <div class="adlim" id="al2">0 / 50</div>
    </div>
    <button class="btn btn-off btn-sm" style="width:56px;padding:11px 0;font-size:16px">▶</button>
  </div>
</div>
</div>

<!-- ЗАДАНИЕ -->
<div class="page" id="page-task">
<div class="topbar">
  <div class="tl">
    <div class="tav" id="av1">?</div>
    <div><div class="tname" id="u1">Загрузка...</div><div class="tbal" id="b1">0 BIT</div></div>
  </div>
  <button class="lbtn" onclick="toggleLang()">RU</button>
</div>
