<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .header {
      background: #000;
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid #ffd700;
    }
    .user-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 15px;
      background: #1a1a1a;
      border-radius: 12px;
      margin: 10px;
    }
    .user-avatar {
      background: #ffd700;
      color: #000;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    .balance-container {
      text-align: center;
      padding: 20px;
    }
    .balance {
      font-size: 40px;
      color: #ffd700;
      margin: 10px 0;
    }
    .bit-balance {
      font-size: 20px;
      color: #ffd700;
    }
    .section {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 15px;
      margin: 15px;
    }
    .section-title {
      font-size: 18px;
      color: #ffd700;
      margin-bottom: 10px;
    }
    .btn {
      background: #ffd700;
      color: #000;
      border: none;
      padding: 15px;
      font-size: 18px;
      border-radius: 12px;
      width: 100%;
      margin: 10px 0;
      cursor: pointer;
    }
    .btn-half {
      width: 48%;
      display: inline-block;
      margin: 5px 1%;
    }
    .countdown-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #ffd700;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px auto;
      font-size: 36px;
      font-weight: bold;
    }
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #000;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #ffd700;
    }
    .nav-btn {
      background: none;
      border: none;
      color: white;
      font-size: 12px;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }
    .nav-btn.active {
      color: #ffd700;
      font-weight: bold;
    }
    .tab {
      display: none;
      padding-bottom: 80px;
    }
    .tab.active {
      display: block;
    }
    .hidden { display: none; }
    .visible { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <div class="user-info">
      <div class="user-avatar" id="user-avatar">?</div>
      <span id="user-name">@username</span>
      <select id="lang-switch">
        <option value="ru">RU</option>
        <option value="en">EN</option>
      </select>
    </div>
  </div>

  <!-- Главная -->
  <div id="main" class="tab active">
    <div class="balance-container">
      <div class="balance">0.00 TON</div>
      <div class="bit-balance">BIT: 0</div>
    </div>

    <div class="section">
      <div class="section-title">РЕКЛАМА</div>
      <button class="btn" onclick="alert('Реклама недоступна')">Смотреть рекламу</button>
    </div>

    <div class="section">
      <div class="section-title">ЧЕК-ИН</div>
      <div>Серия: <span id="streak">0</span> | Множитель: <span id="multiplier">x1.0</span></div>
      <button class="btn" onclick="checkIn()">Забрать</button>
    </div>

    <div class="section">
      <div class="section-title">ОБМЕН BIT → TON</div>
      <div>Курс: 10 000 BIT = 1 TON</div>
      <div>Мин: 500 BIT</div>
      <button class="btn" onclick="exchange()">Обменять</button>
    </div>

    <div class="section">
      <button class="btn btn-half" onclick="deposit()">Депозит ↓</button>
      <button class="btn btn-half" onclick="withdraw()">Вывод ↑</button>
    </div>
  </div>

  <!-- PvP -->
  <div id="pvp" class="tab">
    <div class="section">
      <div class="section-title">PvP</div>
      <div class="countdown-circle" id="pvp-timer">15</div>
      <div>Мин. ставка: 0.01 TON</div>
      <input type="number" id="pvp-amount" placeholder="Сумма ставки" min="0.01" step="0.01">
      <button class="btn" onclick="startPvP()">Ставить</button>
    </div>
  </div>

  <!-- Задание -->
  <div id="zadanie" class="tab">
    <div class="section">
      <div class="section-title">Задания</div>
      <p>Пока нет заданий</p>
    </div>
  </div>

  <!-- Друзья -->
  <div id="druzja" class="tab">
    <div class="section">
      <div class="section-title">Друзья</div>
      <p>Приглашено: <span id="referrals">0</span></p>
      <p>Заработано: <span id="ref-earned">0.000</span> TON</p>
      <button class="btn" onclick="copyRefLink()">Скопировать ссылку</button>
    </div>
  </div>

  <!-- Профиль -->
  <div id="profile" class="tab">
    <div class="section">
      <div class="section-title">Профиль</div>
      <p id="profile-name">@username</p>
      <button class="btn" onclick="connectWallet()">Подключить кошелёк</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn" onclick="showTab('pvp')">PvP</button>
    <button class="nav-btn" onclick="showTab('zadanie')">Задание</button>
    <button class="nav-btn active" onclick="showTab('main')">Главная</button>
    <button class="nav-btn" onclick="showTab('druzja')">Друзья</button>
    <button class="nav-btn" onclick="showTab('profile')">Профиль</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const tonConnectUI = new TONCONNECT_UI.TonConnectUI({
      manifestUrl: 'https://ton.org/tonconnect-manifest.json' // можно заменить на свой
    });

    let lang = 'ru';
    let ton = 0;
    let bit = 0;
    let streak = 0;
    let multiplier = 1.0;
    let lastCheckIn = 0;
    let referrals = 0;
    let refEarned = 0;
    let walletConnected = false;

    const user = tg.initDataUnsafe.user || {};
    const username = user.username ? '@' + user.username : '@username';

    document.getElementById('user-name').innerText = username;
    document.getElementById('user-avatar').innerText = username.charAt(1).toUpperCase();
    document.getElementById('profile-name').innerText = username;

    function updateBalance() {
      document.querySelector('.balance').innerText = ton.toFixed(3) + ' TON';
      document.querySelector('.bit-balance').innerText = 'BIT: ' + bit;
    }

    function showTab(tabId) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.target.classList.add('active');
    }

    function checkIn() {
      const now = Date.now();
      if (now - lastCheckIn > 86400000) { // 24 часа
        streak = Math.min(streak + 1, 5);
        multiplier = 1.0 + (streak * 0.1);
        lastCheckIn = now;
        bit += 10 * multiplier;
        alert('Чек-ин выполнен! + ' + (10 * multiplier) + ' BIT | Множитель x' + multiplier.toFixed(1));
      } else {
        alert('Сегодня уже получено');
      }
      updateBalance();
    }

    function exchange() {
      if (bit >= 500) {
        const tonAdd = bit / 10000;
        ton += tonAdd;
        bit = 0;
        alert('Обмен выполнен! +' + tonAdd.toFixed(3) + ' TON');
        updateBalance();
      } else {
        alert('Недостаточно BIT (мин 500)');
      }
    }

    function deposit() {
      if (!walletConnected) {
        alert('Сначала подключите кошелёк');
        return;
      }
      const amount = prompt('Сумма депозита (мин 0.1 TON):');
      if (amount && parseFloat(amount) >= 0.1) {
        const nano = Math.floor(parseFloat(amount) * 1e9).toString();
        tonConnectUI.sendTransaction({
          messages: [{
            address: 'UQAG8cx9dXAWIfcoNUkdyki-Un9QzJxw3_xU8624H6OnZFMb',
            amount: nano
          }],
          validUntil: Math.floor(Date.now() / 1000) + 300
        }).then(() => {
          ton += parseFloat(amount);
          updateBalance();
          alert('Депозит выполнен! +' + amount + ' TON');
        }).catch(e => alert('Ошибка: ' + (e.message || 'Отклонено')));
      }
    }

    function withdraw() {
      const amount = prompt('Сумма вывода (мин 0.5 TON):');
      if (amount && parseFloat(amount) >= 0.5 && parseFloat(amount) <= ton) {
        alert('Заявка на ' + amount + ' TON создана! Ожидайте (ручной вывод)');
      } else {
        alert('Неверная сумма');
      }
    }

    function connectWallet() {
      tonConnectUI.openModal();
      tonConnectUI.onStatusChange(wallet => {
        if (wallet) {
          walletConnected = true;
          alert('Кошелёк подключён!');
        }
      });
    }

    function copyRefLink() {
      const link = `https://t.me/Orbit_tonbot?startapp=${user.id || 'ref'}`;
      navigator.clipboard.writeText(link);
      alert('Ссылка скопирована!');
    }

    function startPvP() {
      let time = 15;
      const timer = document.getElementById('pvp-timer');
      timer.innerText = time;
      const int = setInterval(() => {
        time--;
        timer.innerText = time;
        if (time <= 0) {
          clearInterval(int);
          alert('PvP запущен!');
        }
      }, 1000);
    }

    document.getElementById('lang-switch').addEventListener('change', e => {
      lang = e.target.value;
      document.documentElement.lang = lang;
      // Можно добавить переводы для всех текстов через data-lang, но пока базово
    });

    updateBalance();
  </script>
</body>
        </html>
