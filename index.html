<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .header {
      background: #000;
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid #ffd700;
    }
    .wallet {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 15px;
      margin: 15px;
      text-align: center;
      color: #ffd700;
      font-size: 18px;
    }
    .balance-box {
      background: #1a1a1a;
      border-radius: 15px;
      padding: 20px;
      margin: 15px;
      text-align: center;
    }
    .balance-title {
      font-size: 22px;
      color: #ffd700;
      margin-bottom: 10px;
    }
    .ton {
      font-size: 36px;
      color: #ffd700;
    }
    .bit {
      font-size: 20px;
      color: #ffd700;
      margin-top: 10px;
    }
    .btn {
      background: #ffd700;
      color: black;
      border: none;
      padding: 15px;
      font-size: 18px;
      border-radius: 12px;
      width: 90%;
      margin: 10px auto;
      display: block;
      cursor: pointer;
    }
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #000;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #ffd700;
    }
    .nav-btn {
      background: none;
      border: none;
      color: white;
      font-size: 12px;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }
    .nav-btn.active {
      color: #ffd700;
      font-weight: bold;
    }
    .tab {
      display: none;
      padding: 80px 15px 100px;
      text-align: center;
    }
    .tab.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>Orbit</h2>
  </div>

  <div class="wallet">TON - кошелёк</div>

  <!-- Главная (открывается сразу) -->
  <div id="main" class="tab active">
    <div class="balance-box">
      <div class="balance-title">БАЛАНС:</div>
      <div class="ton">0.00 TON</div>
      <div class="bit">BIT: 0</div>
    </div>

    <div class="balance-box">
      <div class="balance-title">ОБМЕН</div>
      <button class="btn" onclick="alert('Обмен недоступен (BIT 0)')">Обмен</button>
    </div>

    <button class="btn" onclick="alert('Депозит: мин 0.1 TON (пока симуляция)')">Депозит ↓</button>
    <button class="btn" onclick="withdraw()">Вывод ↑</button>
  </div>

  <!-- PvP -->
  <div id="pvp" class="tab">
    <h2>PvP</h2>
    <p>Пока недоступно</p>
  </div>

  <!-- Задание -->
  <div id="zadanie" class="tab">
    <h2>Задание</h2>
    <p>Пока нет заданий</p>
  </div>

  <!-- Друзья -->
  <div id="druzja" class="tab">
    <h2>Друзья</h2>
    <p>Приглашай друзей и получай 5%</p>
  </div>

  <!-- Профиль -->
  <div id="profile" class="tab">
    <h2>Профиль</h2>
    <p>@твой_ник</p>
    <p>Язык: RU/EN</p>
  </div>

  <!-- Навигация -->
  <div class="nav">
    <button class="nav-btn" onclick="showTab('pvp')">PvP</button>
    <button class="nav-btn" onclick="showTab('zadanie')">Задание</button>
    <button class="nav-btn active" onclick="showTab('main')">Главная</button>
    <button class="nav-btn" onclick="showTab('druzja')">Друзья</button>
    <button class="nav-btn" onclick="showTab('profile')">Профиль</button>
  </div>

  <script>
    // Telegram Web App
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Переключение вкладок
    function showTab(tabId) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.target.classList.add('active');
    }

    // Ручной вывод
    function withdraw() {
      alert('Заявка на вывод создана! Ожидайте обработки (до 24 часов, ручной вывод).');
    }
  </script>
</body>
</html>
